<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <style>
        body {
            width: 320px;
            font-family: Arial, sans-serif;
            padding: 16px;
            background: #f5f7fa;
        }

        h2 {
            color: #2d6be4;
            font-size: 15px;
            margin-bottom: 4px;
        }

        p.sub {
            color: #888;
            font-size: 12px;
            margin-bottom: 14px;
        }

        .filter-group {
            margin-bottom: 10px;
        }

        label {
            font-size: 12px;
            color: #444;
            display: block;
            margin-bottom: 4px;
        }

        select,
        input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            box-sizing: border-box;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        .row .filter-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2d6be4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            font-weight: bold;
        }

        button:hover {
            background: #1a55c8;
        }

        button.secondary {
            background: #fff;
            color: #2d6be4;
            border: 1px solid #2d6be4;
            margin-top: 6px;
            font-weight: normal;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            color: #444;
            text-align: center;
            min-height: 18px;
        }

        #status.success {
            color: #2e7d32;
        }

        #status.error {
            color: #c62828;
        }
    </style>
</head>

<body>
    <h2>🎫 Zoho Ticket Exporter</h2>
    <p class="sub">Export tickets → Markdown cho NotebookLM</p>

    <div class="filter-group">
        <label>📋 Trạng thái</label>
        <select id="filterStatus">
            <option value="all">Tất cả</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
        </select>
    </div>

    <div class="row">
        <div class="filter-group">
            <label>🏢 Office (Requester)</label>
            <input type="text" id="filterOffice" placeholder="VD: HLS VN, HLS TH..." />
        </div>
        <div class="filter-group">
            <label>👤 Assigned To</label>
            <input type="text" id="filterAssigned" placeholder="VD: Rachel..." />
        </div>
    </div>

    <div class="row">
        <div class="filter-group">
            <label>📅 Từ ngày</label>
            <input type="date" id="filterDateFrom" />
        </div>
        <div class="filter-group">
            <label>📅 Đến ngày</label>
            <input type="date" id="filterDateTo" />
        </div>
    </div>

    <div class="filter-group">
        <label>🔍 Tìm theo từ khóa (Subject)</label>
        <input type="text" id="filterKeyword" placeholder="VD: ERP, Invoice, Outlook..." />
    </div>

    <button id="btnExport">⬇️ Export Markdown (.md)</button>
    <button class="secondary" id="btnPreview">👁 Xem trước số lượng ticket</button>

    <div id="status"></div>

    <script src="popup.js"></script>
</body>

</html>
